# Read the Docs configuration for this Jupyter Book.
# Reference: https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Convert the Jupyter Book (_config.yml + _toc.yml) into a Sphinx conf.py
      # so Read the Docs can build it like any other Sphinx project.
      - "jupyter-book config sphinx docs/"

# Install only what is needed to BUILD the site (the notebooks are not executed here).
python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/conf.py
  # fail_on_warning is intentionally left at its default (false): the published notebooks
  # contain informational stderr output that would otherwise abort a strict build.
